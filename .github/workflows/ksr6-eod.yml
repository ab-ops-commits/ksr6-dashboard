name: KSR6 EOD Scan

on:
  schedule:
    # 13:15 UTC = 18:45 IST, Mon-Fri (after NSE close + EOD data settles)
    - cron: "15 13 * * 1-5"
  workflow_dispatch: {}   # manual "Run workflow" button for testing

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run EOD scan
        run: python ksr6_eod_runner.py

      - name: Commit dashboard
        run: |
          git config user.name "ksr6-bot"
          git config user.email "actions@github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "EOD scan $(date -u +%Y-%m-%d)"
          git push
